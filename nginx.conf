server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # 静态资源长期缓存（文件名含 hash）
    location /js/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    location /css/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # 剧本 JSON 文件：短缓存，方便更新
    location /scripts/ {
        expires 1h;
        add_header Cache-Control "public";
    }
    location = /scripts-index.json {
        expires 10m;
        add_header Cache-Control "public";
    }

    # 其余文件（index.html、图标等）：不缓存，确保更新即时生效
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
