# 判断是否为 WebSocket 升级请求，用于分流到后端 WS 服务
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# 图片缓存配置
proxy_cache_path /var/cache/nginx/images levels=1:2 keys_zone=image_cache:10m max_size=1g inactive=30d use_temp_path=off;

# 图片代理：允许代理任意 URL
map $arg_url $image_proxy_target {
    ~*^https?:// $arg_url;
    default "";
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # DNS 解析器（Docker 内部 DNS + 公共 DNS 备用）
    resolver 127.0.0.11 8.8.8.8 valid=300s;

    # gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # 静态资源长期缓存（文件名含 hash）
    location /js/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    location /css/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # 剧本 JSON 文件：短缓存，方便更新
    location /scripts/ {
        expires 1h;
        add_header Cache-Control "public";
    }
    location = /scripts-index.json {
        expires 10m;
        add_header Cache-Control "public";
    }

    # 图片代理缓存：缓存外部角色图标
    # 请求格式: /image-proxy/?url=https://bloodstar.xyz/path/to/image.png
    # 只允许代理白名单域名（bloodstar.xyz、gstonegames.com）
    location /image-proxy/ {
        # 无 URL 参数或域名不在白名单
        if ($image_proxy_target = "") {
            return 403;
        }

        proxy_cache image_cache;
        proxy_cache_valid 200 30d;
        proxy_cache_valid 404 1m;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_key $image_proxy_target;
        add_header X-Cache-Status $upstream_cache_status;

        proxy_pass $image_proxy_target;
        proxy_ssl_server_name on;
        proxy_set_header Host $proxy_host;
        proxy_hide_header Set-Cookie;
        proxy_hide_header X-Request-Id;

        # 图片缓存头
        expires 30d;
        add_header Cache-Control "public";
    }

    # WebSocket 反向代理（通过 error_page 418 技巧分流）
    location @websocket {
        proxy_pass http://ws:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # 其余文件（index.html、图标等）：不缓存，确保更新即时生效
    # WebSocket 升级请求会被分流到 @websocket
    location / {
        error_page 418 = @websocket;
        if ($http_upgrade = "websocket") {
            return 418;
        }
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
