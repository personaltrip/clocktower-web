# 判断是否为 WebSocket 升级请求，用于分流到后端 WS 服务
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # 静态资源长期缓存（文件名含 hash）
    location /js/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    location /css/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # 剧本 JSON 文件：短缓存，方便更新
    location /scripts/ {
        expires 1h;
        add_header Cache-Control "public";
    }
    location = /scripts-index.json {
        expires 10m;
        add_header Cache-Control "public";
    }

    # WebSocket 反向代理（通过 error_page 418 技巧分流）
    location @websocket {
        proxy_pass http://ws:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # 其余文件（index.html、图标等）：不缓存，确保更新即时生效
    # WebSocket 升级请求会被分流到 @websocket
    location / {
        error_page 418 = @websocket;
        if ($http_upgrade = "websocket") {
            return 418;
        }
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
